<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="50%" stop-color="#047857" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#047857" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Shield -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bgGrad)" filter="url(#glow)"/>
  
  <!-- Inner Subtle Ring -->
  <rect x="48" y="48" width="416" height="416" rx="88" fill="none" stroke="#34d399" stroke-width="6" stroke-opacity="0.3"/>

  <!-- Academic Mortarboard Cap -->
  <path d="M 256 128 L 416 208 L 256 288 L 96 208 Z" fill="url(#capGrad)"/>
  
  <!-- Cap Underbody -->
  <path d="M 160 248 V 312 C 160 344, 352 344, 352 312 V 248" fill="none" stroke="url(#capGrad)" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Tassel -->
  <path d="M 376 228 V 318" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round"/>
  <circle cx="376" cy="330" r="14" fill="url(#goldGrad)"/>
  <circle cx="256" cy="208" r="14" fill="url(#goldGrad)"/>
</svg>
